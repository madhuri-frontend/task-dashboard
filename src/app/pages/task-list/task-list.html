<h2>Task List</h2>

<input
  type="text"
  placeholder="Search tasks..."
  (input)="updateSearch($event.target.value)"
  class="search-input"
/>

<div class="task-grid">
  <div class="task-card" *ngFor="let task of filteredTasks()">
    <h3>{{ task.title }}</h3>

    <span class="badge" [class.completed]="task.completed" [class.pending]="!task.completed">
      {{ task.completed ? 'Completed' : 'Pending' }}
    </span>

    <button (click)="toggleTask(task.id)">Toggle Status</button>

    <button (click)="deleteTask(task.id)" class="delete-btn">Delete</button>

    <button [routerLink]="['/tasks', task.id]">View Details</button>
  </div>
</div>
